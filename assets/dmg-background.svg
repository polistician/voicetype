<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e12"/>
      <stop offset="1" stop-color="#1a1d28"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d8fdb" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4d8fdb" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- ===== TOP: brand (compact, y=40-72) ===== -->
  <text x="400" y="50" font-family="-apple-system, sans-serif"
        font-size="28" font-weight="700" text-anchor="middle"
        letter-spacing="-1">
    <tspan fill="#7eb1e8">Voice</tspan><tspan fill="#ffffff">Type</tspan>
  </text>
  <text x="400" y="74" font-family="-apple-system, sans-serif"
        font-size="12" text-anchor="middle" fill="#a8b0c0">
    hold ⌥ C, speak, the text appears.
  </text>

  <!-- ===== MIDDLE: icons placed by create-dmg at y=180. Arrow between them. ===== -->
  <line x1="310" y1="180" x2="490" y2="180"
        stroke="#7eb1e8" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="9 7"/>
  <polyline points="478,168 492,180 478,192"
            fill="none" stroke="#7eb1e8" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== INSTRUCTION CARD: y=270 to y=410 — well within visible zone ===== -->
  <rect x="70" y="270" width="660" height="140" rx="14" fill="url(#band)"
        stroke="#4d8fdb" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Step 1 -->
  <circle cx="100" cy="305" r="13" fill="#4d8fdb"/>
  <text x="100" y="310" font-family="-apple-system, sans-serif"
        font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">1</text>
  <text x="125" y="310" font-family="-apple-system, sans-serif"
        font-size="14" font-weight="600" fill="#ffffff">
    Drag VoiceType into Applications
  </text>

  <!-- Step 2 -->
  <circle cx="100" cy="345" r="13" fill="#4d8fdb"/>
  <text x="100" y="350" font-family="-apple-system, sans-serif"
        font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">2</text>
  <text x="125" y="350" font-family="-apple-system, sans-serif"
        font-size="14" font-weight="600" fill="#ffffff">
    Open VoiceType from /Applications
  </text>

  <!-- Step 3 -->
  <circle cx="100" cy="385" r="13" fill="#4d8fdb"/>
  <text x="100" y="390" font-family="-apple-system, sans-serif"
        font-size="13" font-weight="700" text-anchor="middle" fill="#ffffff">3</text>
  <text x="125" y="390" font-family="-apple-system, sans-serif"
        font-size="14" font-weight="600" fill="#ffffff">
    macOS warns? <tspan fill="#7eb1e8">System Settings → Privacy &amp; Security → Open Anyway</tspan>
  </text>
</svg>
