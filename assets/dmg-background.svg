<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e12"/>
      <stop offset="1" stop-color="#1a1d28"/>
    </linearGradient>
    <!-- Pill background for the instruction band — high-contrast guaranteed visibility -->
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d8fdb" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4d8fdb" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- ===== TOP: brand ===== -->
  <text x="400" y="62" font-family="-apple-system, sans-serif"
        font-size="32" font-weight="700" text-anchor="middle"
        letter-spacing="-1.2">
    <tspan fill="#7eb1e8">Voice</tspan><tspan fill="#ffffff">Type</tspan>
  </text>
  <text x="400" y="88" font-family="-apple-system, sans-serif"
        font-size="13" text-anchor="middle" fill="#a8b0c0">
    hold ⌥ C, speak, the text appears.
  </text>

  <!-- ===== MIDDLE: drag visualization (icons placed by create-dmg at y=230) ===== -->
  <line x1="310" y1="230" x2="490" y2="230"
        stroke="#7eb1e8" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="9 7"/>
  <polyline points="478,218 492,230 478,242"
            fill="none" stroke="#7eb1e8" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== INSTRUCTION BAND: clearly visible, high contrast ===== -->
  <rect x="80" y="320" width="640" height="60" rx="12" fill="url(#band)"
        stroke="#4d8fdb" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="345" font-family="-apple-system, sans-serif"
        font-size="15" font-weight="700" text-anchor="middle"
        fill="#ffffff" letter-spacing="0.5">
    Step 1 — Drag VoiceType into Applications
  </text>
  <text x="400" y="368" font-family="-apple-system, sans-serif"
        font-size="12" text-anchor="middle" fill="#c8d0e0">
    Step 2 — Open VoiceType from /Applications. macOS warns once.
  </text>

  <!-- ===== BOTTOM: Gatekeeper bypass detail ===== -->
  <text x="400" y="416" font-family="-apple-system, sans-serif"
        font-size="13" text-anchor="middle" fill="#ffffff" font-weight="600">
    System Settings → Privacy &amp; Security → Open Anyway
  </text>
  <text x="400" y="438" font-family="-apple-system, sans-serif"
        font-size="11" text-anchor="middle" fill="#a8b0c0">
    Click past the warning once. You'll never see it again.
  </text>
</svg>
