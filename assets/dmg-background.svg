<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e12"/>
      <stop offset="1" stop-color="#1a1d28"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Wordmark top -->
  <text x="400" y="80" font-family="-apple-system, sans-serif"
        font-size="38" font-weight="700" text-anchor="middle"
        letter-spacing="-1.2">
    <tspan fill="#7eb1e8">Voice</tspan><tspan fill="#ffffff">Type</tspan>
  </text>
  <text x="400" y="112" font-family="-apple-system, sans-serif"
        font-size="14" text-anchor="middle" fill="#a8b0c0">
    hold ⌥ C, speak, the text appears.
  </text>

  <!-- Drag arrow between the two icons (icons placed by create-dmg at x=220 and x=580, y=230) -->
  <line x1="310" y1="230" x2="490" y2="230"
        stroke="#7eb1e8" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="9 7"/>
  <polyline points="478,218 492,230 478,242"
            fill="none" stroke="#7eb1e8" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Drag instruction (light gray for high contrast on dark) -->
  <text x="400" y="370" font-family="-apple-system, sans-serif"
        font-size="13" text-anchor="middle" fill="#c8d0e0"
        letter-spacing="2" font-weight="600">
    DRAG VOICETYPE TO APPLICATIONS
  </text>

  <!-- Bottom: Gatekeeper note -->
  <text x="400" y="420" font-family="-apple-system, sans-serif"
        font-size="12" text-anchor="middle" fill="#a8b0c0">
    First launch: <tspan fill="#7eb1e8" font-weight="600">System Settings → Privacy &amp; Security → Open Anyway</tspan>
  </text>
  <text x="400" y="442" font-family="-apple-system, sans-serif"
        font-size="11" text-anchor="middle" fill="#7a8194">
    macOS warns once. Click past it; you'll never see it again.
  </text>
</svg>
